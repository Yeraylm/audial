# Netlify — frontend estático de Audial
# El backend corre en Hugging Face Spaces (gratis).
#
# Configuración en Netlify Dashboard → Site settings → Environment variables:
#   AUDIAL_API_URL = https://<tu-usuario>-audial-backend.hf.space
#
# Si el backend está en otro servicio, pon su URL aquí.

[build]
  publish = "frontend"
  command = ""   # sin build — HTML/JS/CSS estático puro

[build.environment]
  AUDIAL_API_URL = ""   # sobreescribir en Netlify Dashboard

# Proxy /api/* al backend (evita CORS y expone una sola URL)
[[redirects]]
  from   = "/api/*"
  to     = ":AUDIAL_API_URL/api/:splat"
  status = 200
  force  = true

# SPA fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Cache-Control          = "public, max-age=3600"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"
