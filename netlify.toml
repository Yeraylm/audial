# Netlify configuration for the Audial frontend.
# The Python backend (FastAPI) must run on a separate service
# such as Render (render.yaml) or Railway.
#
# Once the backend is deployed, set the environment variable:
#   AUDIAL_API_URL = https://audial-backend.onrender.com
# in the Netlify site settings → Environment variables.
# The _redirects rule below will proxy /api/* to that backend.

[build]
  publish = "frontend"
  # No build command needed — pure static HTML/JS

[build.environment]
  # Override in Netlify dashboard with the actual backend URL
  AUDIAL_API_URL = ""

# Proxy /api/* to the backend (avoids CORS issues)
[[redirects]]
  from   = "/api/*"
  to     = ":AUDIAL_API_URL/api/:splat"
  status = 200
  force  = true
  conditions = {Role = ["admin", "editor"]}

# SPA fallback — serve index.html for all routes
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Cache-Control          = "public, max-age=3600"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
