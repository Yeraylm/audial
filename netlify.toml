# Netlify — frontend estático de Audial
# Proxy /api/* directamente al backend en HF Spaces

[build]
  publish = "frontend"
  command = ""

# Proxy de API al backend (evita CORS, una sola URL para el usuario)
[[redirects]]
  from   = "/api/*"
  to     = "https://yeray22-audial-backend.hf.space/api/:splat"
  status = 200
  force  = true

# SPA fallback — siempre sirve index.html para rutas del frontend
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
