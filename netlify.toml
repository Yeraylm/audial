# Netlify — Audial frontend
# Backend en HF Spaces: https://yeray22-audial-backend.hf.space

[build]
  publish = "frontend"
  command = ""

# --- API proxy (orden importa: más específicos primero) ---
[[redirects]]
  from   = "/docs"
  to     = "https://yeray22-audial-backend.hf.space/docs"
  status = 200
  force  = true

[[redirects]]
  from   = "/redoc"
  to     = "https://yeray22-audial-backend.hf.space/redoc"
  status = 200
  force  = true

[[redirects]]
  from   = "/openapi.json"
  to     = "https://yeray22-audial-backend.hf.space/openapi.json"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/*"
  to     = "https://yeray22-audial-backend.hf.space/api/:splat"
  status = 200
  force  = true

# SPA fallback — siempre al final
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
